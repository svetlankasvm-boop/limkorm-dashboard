<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limkorm Group — Premium Sales Analytics Dashboard</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
 <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #F0F4F8;
            color: #1A2C3E;
        }

        /* Корпоративные цвета */
        :root {
            --primary-dark: #004D7A;
            --primary: #006098;
            --primary-light: #0080B8;
            --secondary: #00C0DE;
            --secondary-dark: #00A0B8;
            --accent: #00C0DE;
            --gray-50: #F8F9FC;
            --gray-100: #F0F2F6;
            --gray-200: #E4E8EE;
            --gray-600: #5A6F84;
            --gray-700: #3D4F62;
            --gray-800: #2C3E50;
            --shadow-sm: 0 8px 20px rgba(0,0,0,0.03), 0 2px 4px rgba(0,0,0,0.02);
            --shadow-md: 0 12px 28px rgba(0,0,0,0.06);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.08);
            --gradient-primary: linear-gradient(135deg, #006098 0%, #00C0DE 100%);
            --gradient-dark: linear-gradient(135deg, #004D7A 0%, #006098 100%);
        }

        .dashboard-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 16px 20px;
        }

        /* Премиум шапка */
        .premium-header {
            background: var(--gradient-dark);
            border-radius: 24px;
            padding: 20px 28px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }

        .premium-header::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0,192,222,0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .premium-header::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -5%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(0,96,152,0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .logo-section h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
            position: relative;
            z-index: 1;
        }

        .logo-section .subhead {
            color: rgba(255,255,255,0.8);
            font-size: 0.85rem;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .brand-badge {
            background: rgba(0,192,222,0.25);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #00C0DE;
        }

        .upload-module {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            padding: 6px 8px 6px 8px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
            z-index: 1;
        }

        .file-status {
            color: rgba(255,255,255,0.85);
            font-size: 0.8rem;
            font-weight: 500;
        }

        .upload-btn {
            background: var(--secondary);
            border: none;
            padding: 12px 28px;
            border-radius: 44px;
            font-weight: 700;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        .upload-btn:hover {
            background: var(--secondary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,192,222,0.35);
        }

        /* KPI Cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

/* Обновленные стили для KPI карточек - более компактные */
.kpi-card {
    background: white;
    border-radius: 20px;
    padding: 16px 18px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--gray-200);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
    text-align: center;
}

.kpi-card::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: var(--gradient-primary);
}

.kpi-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-md);
}

.kpi-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 700;
    color: var(--gray-600);
    margin-bottom: 6px;
}

.kpi-value {
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--primary);
    margin: 4px 0 8px;
    line-height: 1.1;
}

.kpi-trend {
    font-size: 0.75rem;
    display: flex;
    justify-content: center; /* ВМЕСТО space-between */
    align-items: center;
    gap: 24px; /* УВЕЛИЧИТЬ РАССТОЯНИЕ МЕЖДУ ДВУМЯ ПОКАЗАТЕЛЯМИ */
    font-weight: 600;
    padding-top: 6px;
    border-top: 1px solid var(--gray-100);
}

.trend-item {
    text-align: center;
    flex: 1;
}

.trend-label {
    font-size: 0.6rem;
    color: #666;
    display: block;
    margin-bottom: 2px;
}

.trend-value {
    font-size: 0.8rem;
    font-weight: 700;
    white-space: nowrap;
}

        /* Insight Panel */
        .insight-premium {
            background: linear-gradient(112deg, #F0F8FA 0%, #FAFDFF 100%);
            border-radius: 20px;
            padding: 16px 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(0,192,222,0.3);
            box-shadow: var(--shadow-sm);
        }

        .insight-title {
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 12px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .insight-text {
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--gray-700);
            font-weight: 500;
        }

        /* Chart Cards */
        .chart-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
        }

        .chart-card {
            background: white;
            border-radius: 20px;
            padding: 16px 16px 20px;
            flex: 1 1 calc(50% - 24px);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
            transition: all 0.2s;
        }

        .chart-card:hover {
            box-shadow: var(--shadow-md);
        }

        .chart-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--gray-100);
        }

        .chart-header h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--gray-800);
        }

        .chart-icon {
            width: 36px;
            height: 36px;
            background: rgba(0,96,152,0.1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        canvas {
            max-height: 320px;
            width: 100%;
        }

        .full-width {
            flex: 1 1 100%;
        }

        /* Кнопки переключения метрик */
        .metric-btn {
            background: #f0f2f6;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            color: var(--gray-700);
        }

        .metric-btn:hover {
            background: var(--secondary);
            color: white;
        }

        .metric-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 8px rgba(0,96,152,0.3);
        }

        /* Premium Table */
        .table-container {
            overflow-x: auto;
            border-radius: 20px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }

        .data-table th {
            background: var(--gray-50);
            padding: 10px 12px;
            text-align: left;
            font-weight: 700;
            color: var(--primary-dark);
            border-bottom: 2px solid var(--gray-200);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.7px;
        }

        .data-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--gray-100);
            color: var(--gray-700);
            font-weight: 500;
        }

        .product-badge {
            background: linear-gradient(135deg, var(--gray-100), white);
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--primary);
            display: inline-block;
            border: 1px solid var(--gray-200);
        }

        .loader {
            text-align: center;
            padding: 80px;
            background: white;
            border-radius: 40px;
            color: var(--gray-600);
            font-weight: 500;
            box-shadow: var(--shadow-sm);
        }

        footer {
            text-align: center;
            margin-top: 32px;
            padding: 16px;
            font-size: 0.7rem;
            color: var(--gray-600);
            border-top: 1px solid var(--gray-200);
        }

        @media (max-width: 900px) {
            .dashboard-container { padding: 12px; }
            .premium-header { flex-direction: column; align-items: flex-start; }
            .chart-card { flex: 1 1 100%; }
        }

        /* Полноэкранный режим */
        .fullscreen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 10000;
            padding: 20px;
            overflow: auto;
        }

        .fullscreen-overlay .chart-card {
            width: 100%;
            height: 100%;
            margin: 0;
            flex: none;
        }

        .fullscreen-overlay canvas {
            max-height: calc(100vh - 120px);
            height: auto;
        }

        .fullscreen-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all 0.2s;
            margin-left: auto;
        }

        .fullscreen-btn:hover {
            background: rgba(0,0,0,0.05);
            transform: scale(1.05);
        }

        .close-fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--primary);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 10001;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: white;
            font-weight: bold;
        }

        .close-fullscreen-btn:hover {
            background: var(--primary-light);
            transform: scale(1.1);
        }

        /* Стили для новой интерактивной таблицы */
        .metrics-selector {
            background: white;
            border-radius: 20px;
            padding: 16px 20px;
            margin-bottom: 20px;
            border: 1px solid var(--gray-200);
            box-shadow: var(--shadow-sm);
        }

        .metrics-title {
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 12px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .metrics-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--gray-200);
        }

        .metric-option {
            background: #f0f2f6;
            border: 2px solid transparent;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            color: var(--gray-700);
        }

        .metric-option:hover {
            background: var(--secondary);
            color: white;
            transform: translateY(-2px);
        }

        .metric-option.selected {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 8px rgba(0,96,152,0.3);
        }

        .export-btn {
            background: var(--gradient-primary);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
            margin-left: auto;
        }

        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,96,152,0.3);
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
            margin-top: 16px;
        }

        .dynamic-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            background: white;
        }

        .dynamic-table th {
            background: var(--gradient-primary);
            color: white;
            padding: 12px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .dynamic-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--gray-100);
            color: var(--gray-700);
            font-weight: 500;
        }

        .dynamic-table tr:hover {
            background: var(--gray-50);
        }

        .table-status {
            text-align: center;
            padding: 40px;
            color: var(--gray-600);
            font-weight: 500;
        }

        /* Стили для сортируемых заголовков */
        .sortable-header {
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
            position: relative;
            padding-right: 25px !important;
        }

        .sortable-header:hover {
            background: linear-gradient(135deg, #0080B8 0%, #006098 100%);
        }

        .sortable-header::after {
            content: '⇅';
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            opacity: 0.6;
        }

        .sortable-header.asc::after {
            content: '↑';
            opacity: 1;
        }

        .sortable-header.desc::after {
            content: '↓';
            opacity: 1;
        }

        /* Ограничение высоты таблицы с прокруткой */
        .table-container-scroll {
            max-height: 500px;
            overflow-y: auto;
            overflow-x: auto;
            border-radius: 16px;
            margin-top: 16px;
            position: relative;
        }

        .table-container-scroll table {
            width: 100%;
        }

        .table-container-scroll thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .table-container-scroll th {
            position: sticky;
            top: 0;
            background: var(--gradient-primary);
            z-index: 11;
        }

        /* Упрощенные настройки показателей без подгрупп */
        .simple-metrics {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .simple-metrics .metric-option {
            font-size: 0.8rem;
            padding: 6px 14px;
        }

        /* Стили для двойного переключателя */
        .global-controls {
            display: flex;
            gap: 8px;
            margin-left: auto;
            align-items: center;
        }

        .mode-selector, .period-selector {
            background: var(--primary);
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .mode-selector:hover, .period-selector:hover {
            background: var(--primary-light);
            transform: translateY(-1px);
        }

        .period-selector.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .reset-btn {
            background: var(--gray-600);
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background: var(--gray-700);
        }

        /* Индикаторы на заголовках */
        .column-indicator {
            margin-left: 6px;
            font-size: 0.7rem;
            display: inline-block;
        }

        /* Контекстное меню */
        .context-menu {
            position: fixed;
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--gray-200);
            z-index: 10000;
            min-width: 180px;
            overflow: hidden;
        }

        .context-menu-item {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .context-menu-item:hover {
            background: var(--gray-100);
        }

        .context-menu-item.active {
            background: var(--primary);
            color: white;
        }

        .context-menu-divider {
            height: 1px;
            background: var(--gray-200);
            margin: 4px 0;
        }

        /* Стили для блока фильтров */
        .filters-panel {
            background: white;
            border-radius: 20px;
            padding: 16px 20px;
            margin-bottom: 20px;
            border: 1px solid var(--gray-200);
            box-shadow: var(--shadow-sm);
        }

        .filters-title {
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 12px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filters-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 120px;
        }

        .filter-group label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--gray-600);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-actions {
            display: flex;
            gap: 8px;
            margin-left: auto;
            align-items: flex-end;
        }

        .apply-filters-btn, .reset-filters-btn {
            background: var(--primary);
            border: none;
            padding: 8px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.8rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .apply-filters-btn:hover {
            background: var(--primary-light);
            transform: translateY(-1px);
        }

        .reset-filters-btn {
            background: var(--gray-600);
        }

        .reset-filters-btn:hover {
            background: var(--gray-700);
        }

        /* Стили для мультиселектов */
        .multiselect {
            position: relative;
            min-width: 180px;
        }

        .multiselect-btn {
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .multiselect-btn:hover {
            border-color: var(--secondary);
        }

        .multiselect-btn.active {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0,96,152,0.2);
        }

        .multiselect-value {
            color: var(--gray-700);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 140px;
        }

        .multiselect-arrow {
            font-size: 0.7rem;
            color: var(--gray-600);
        }

        .multiselect-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            z-index: 1000;
            max-height: 250px;
            overflow-y: auto;
            margin-top: 4px;
            display: none;
        }

        .multiselect-dropdown.show {
            display: block;
        }

        .multiselect-option {
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .multiselect-option:hover {
            background: var(--gray-100);
        }

        .multiselect-option input {
            cursor: pointer;
            accent-color: var(--primary);
        }

        .multiselect-option label {
            cursor: pointer;
            flex: 1;
            font-size: 0.8rem;
            color: var(--gray-700);
        }

        .multiselect-search {
            padding: 8px;
            border-bottom: 1px solid var(--gray-200);
            position: sticky;
            top: 0;
            background: white;
        }

        .multiselect-search input {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid var(--gray-200);
            border-radius: 8px;

// Функция загрузки Excel
async function loadExcelFromUrl(url) {
    try {
        const response = await fetch(url, {
            headers: {
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
            }
        });
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        
        const arrayBuffer = await response.arrayBuffer();
        const workbook = XLSX.read(arrayBuffer, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
        
        delete workbook.Sheets;
        delete workbook;
        
        return rows;
    } catch (error) {
        console.error(`Ошибка загрузки: ${url}`, error);
        return null;
    }
}

function switchMetric(metric) {
    currentMetric = metric;
    
    // Обновляем активную кнопку
    document.querySelectorAll('.metric-btn').forEach(btn => btn.classList.remove('active'));
    const btnId = metric === 'akb' ? 'btnAKB' : metric === 'sales' ? 'btnSales' : 'btnSku';
    const activeBtn = document.getElementById(btnId);
    if (activeBtn) activeBtn.classList.add('active');
    
    // ✅ Добавить проверку на существование unifiedChart
    if (!unifiedChart) {
        console.warn('unifiedChart not initialized yet');
        return;
    }
    
    // ✅ Добавить проверку на существование данных
    if (!unifiedData[metric] || !unifiedData[metric].data2025) {
        console.error(`Data for metric ${metric} not available`);
        return;
    }
    
    // Обновляем данные в графике
    unifiedChart.data.datasets[0].data = unifiedData[metric].data2025;
    unifiedChart.data.datasets[1].data = unifiedData[metric].data2026;
    unifiedChart.data.datasets[2].data = unifiedData[metric].yearOverYearPct;
    unifiedChart.data.datasets[3].data = unifiedData[metric].monthOverMonthPct;
    unifiedChart.data.datasets[4].data = unifiedData[metric].yearOverYearAbs;
    unifiedChart.data.datasets[5].data = unifiedData[metric].monthOverMonthAbs;
    
    // Обновляем подписи осей
    unifiedChart.options.scales.y.title.text = unifiedData[metric].yTitle;
    unifiedChart.options.scales.y2.title.text = `Отклонение (${unifiedData[metric].unit})`;
    
    unifiedChart.update();
}
// Полноэкранный режим для карточки
function toggleFullscreen(cardElement) {
    if (!cardElement) return;
    
    // Если уже есть оверлей — закрываем
    const existingOverlay = document.querySelector('.fullscreen-overlay');
    if (existingOverlay) {

    const fullscreenCanvas = existingOverlay.querySelector('canvas');

    if (fullscreenCanvas && fullscreenCanvas.chart) {
        fullscreenCanvas.chart.destroy();
    }

    existingOverlay.remove();
    return;
}
    
    // Создаём оверлей
    const overlay = document.createElement('div');
    overlay.className = 'fullscreen-overlay';
    
    // Клонируем карточку
    const clone = cardElement.cloneNode(true);
    
    // Добавляем кнопку закрытия

    // Перерисовываем графики в клоне
    setTimeout(() => {
        const cloneCanvas = clone.querySelector('canvas');
        const originalCanvas = cardElement.querySelector('canvas');
        if (cloneCanvas && originalCanvas && originalCanvas.chart) {
            const ctx = cloneCanvas.getContext('2d');

           const configClone = structuredClone(originalChart.config);
const newChart = new Chart(ctx, configClone);

            if (cardElement.id === 'unifiedCard' || clone.querySelector('#unifiedChart')) {

// Расширенная функция с дополнительными параметрами
function saveChartAsJPEG(canvasId, filename = 'chart', quality = 0.95) {
    const originalCanvas = document.getElementById(canvasId);
    if (!originalCanvas) {
        console.error('Canvas not found');
        return;
    }
    
    // Проверяем, есть ли у canvas размеры
    let width = originalCanvas.width;
    let height = originalCanvas.height;
    
    // Если canvas ещё не отрисован с явными размерами, используем стили
    if (width === 0 || height === 0) {
        width = originalCanvas.offsetWidth;
        height = originalCanvas.offsetHeight;
    }
    
    // Создаём временный canvas
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = width;
    tempCanvas.height = height;
    const ctx = tempCanvas.getContext('2d');
    
    // Заливаем белый фон
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, width, height);
    
    // Рисуем график с сохранением пропорций
    ctx.drawImage(originalCanvas, 0, 0, width, height);
    
    // Добавляем небольшую тень для улучшения внешнего вида (опционально)
    ctx.shadowBlur = 0; // отключаем тень для чистого фона
    
    // Сохраняем
    const link = document.createElement('a');
    const timestamp = new Date().toISOString().slice(0,19).replace(/:/g, '-');
    link.download = `${filename}_${timestamp}.jpg`;
    link.href = tempCanvas.toDataURL('image/jpeg', quality);
    link.click();
}

// Функция для сохранения с выбором формата (JPEG/PNG)
function saveChartAsImage(canvasId, filename = 'chart', format = 'jpeg') {
    const originalCanvas = document.getElementById(canvasId);
    if (!originalCanvas) {
        console.error('Canvas not found');
        return;
    }
    
    const tempCanvas = document.createElement('canvas');
    const ctx = tempCanvas.getContext('2d');
    
    tempCanvas.width = originalCanvas.width;
    tempCanvas.height = originalCanvas.height;
    
    // Белый фон
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
    
    // Рисуем график
    ctx.drawImage(originalCanvas, 0, 0);
    
    const timestamp = new Date().toISOString().slice(0,19).replace(/:/g, '-');
    const link = document.createElement('a');
    
    if (format === 'png') {
        link.download = `${filename}_${timestamp}.png`;
        link.href = tempCanvas.toDataURL('image/png');
    } else {
        link.download = `${filename}_${timestamp}.jpg`;
        link.href = tempCanvas.toDataURL('image/jpeg', 0.95);
    }
    
    link.click();
}

// Функция для расчета потерянных СКЮ для иерархической группировки
function calculateLostSKUHierarchy(inventoryData, currentMonth, currentYear, currentMonthNum) {
    // Сортируем данные по дате
    const sortedData = [...inventoryData].sort((a, b) => {
        if (a.year !== b.year) return a.year - b.year;
        return a.monthNum - b.monthNum;
    });
    
    // Определяем матрицу за последние 6 месяцев (исключая текущий месяц)
    const matrixMonths = [];
    for (let i = 1; i <= 6; i++) {
        let targetMonth = currentMonthNum - i;
        let targetYear = currentYear;
        if (targetMonth <= 0) {
            targetMonth += 12;
            targetYear--;
        }
        matrixMonths.push({ year: targetYear, monthNum: targetMonth });
    }
    
    // Группируем данные по иерархии: ДТ -> Тип -> ТМ
    const hierarchyMap = new Map(); // Key: "dt|type|brand"
    
    sortedData.forEach(item => {
        const hierarchyKey = `${item.dt}|${item.type}|${item.brand}`;
        if (!hierarchyMap.has(hierarchyKey)) {
            hierarchyMap.set(hierarchyKey, {
                dt: item.dt,
                type: item.type,
                brand: item.brand,
                matrixSKU: new Set(),      // СКЮ за последние 6 месяцев
                currentSKU: new Set(),     // СКЮ в текущем месяце
                totalStock: 0              // Сумма остатков
            });
        }
        
        const record = hierarchyMap.get(hierarchyKey);
        
        // Суммируем остатки
        if (item.startStock > 0) {
            record.totalStock += item.startStock;
        }
        
        // Определяем, относится ли запись к матрице или текущему месяцу
        const isInMatrix = matrixMonths.some(m => m.year === item.year && m.monthNum === item.monthNum);
        const isCurrentMonth = (item.year === currentYear && item.monthNum === currentMonthNum);
        
        if (isInMatrix && item.skuName) {
            record.matrixSKU.add(item.skuName);
        }
        
        if (isCurrentMonth && item.skuName) {
            record.currentSKU.add(item.skuName);
        }
    });
    
    // Рассчитываем долю потерянных СКЮ для каждой иерархической единицы
    const result = [];
    for (let [key, record] of hierarchyMap.entries()) {
        const matrixSize = record.matrixSKU.size;
        let lostPercent = 0;
        
        if (matrixSize > 0) {
            // Потерянные СКЮ = те, что есть в матрице, но нет в текущем месяце
            let lostCount = 0;
            for (let sku of record.matrixSKU) {
                if (!record.currentSKU.has(sku)) {
                    lostCount++;
                }
            }
            lostPercent = (lostCount / matrixSize) * 100;
        }
        
        result.push({
            dt: record.dt,
            type: record.type || "Не указан",
            brand: record.brand || "Не указана",
            totalStock: record.totalStock,
            lostSKUPercent: lostPercent,
            matrixSKUCount: matrixSize,
            currentSKUCount: record.currentSKU.size
        });
    }
    
    return result;
}

// Функция для экспорта иерархической таблицы остатков в Excel
function exportInventoryToExcel(inventoryHierarchy) {
    if (!inventoryHierarchy || inventoryHierarchy.length === 0) {
        alert('Нет данных об остатках для выгрузки');
        return;
    }
    
    // Подготавливаем данные для Excel (уплощенная структура)
    const excelData = [];
    
    // Заголовки
    excelData.push(['Дистрибьютор (ДТ)', 'Тип корма', 'Торговая марка', 'Начальный остаток, кг', 'Доля потерянных СКЮ, %', 'Матрица СКЮ', 'Текущие СКЮ']);
    
    // Группируем по ДТ
    const dtMap = new Map();
    inventoryHierarchy.forEach(item => {
        if (!dtMap.has(item.dt)) {
            dtMap.set(item.dt, []);
        }
        dtMap.get(item.dt).push(item);
    });
    
    const sortedDTs = Array.from(dtMap.keys()).sort();
    
    for (let dt of sortedDTs) {
        const items = dtMap.get(dt);
        const dtTotalStock = items.reduce((sum, i) => sum + i.totalStock, 0);
        const dtLostPercent = items.length > 0 
            ? items.reduce((sum, i) => sum + i.lostSKUPercent, 0) / items.length 
            : 0;
        const dtMatrixSKU = items.reduce((sum, i) => sum + i.matrixSKUCount, 0);
        const dtCurrentSKU = items.reduce((sum, i) => sum + i.currentSKUCount, 0);
        
        // Строка ДТ
        excelData.push([dt, '—', '—', Math.round(dtTotalStock), dtLostPercent.toFixed(1), dtMatrixSKU, dtCurrentSKU]);
        
        // Группируем по Типу корма
        const typeMap = new Map();
        items.forEach(item => {
            const typeKey = item.type || "Не указан";
            if (!typeMap.has(typeKey)) {
                typeMap.set(typeKey, []);
            }
            typeMap.get(typeKey).push(item);
        });
        
        const sortedTypes = Array.from(typeMap.keys()).sort();
        
        for (let type of sortedTypes) {
            const typeItems = typeMap.get(type);
            const typeTotalStock = typeItems.reduce((sum, i) => sum + i.totalStock, 0);
            const typeLostPercent = typeItems.reduce((sum, i) => sum + i.lostSKUPercent, 0) / typeItems.length;
            const typeMatrixSKU = typeItems.reduce((sum, i) => sum + i.matrixSKUCount, 0);
            const typeCurrentSKU = typeItems.reduce((sum, i) => sum + i.currentSKUCount, 0);
            
            // Строка Типа корма
            excelData.push([`  └─ ${dt}`, type, '—', Math.round(typeTotalStock), typeLostPercent.toFixed(1), typeMatrixSKU, typeCurrentSKU]);
            
            // Строки Торговых марок
            for (let item of typeItems) {
                const brandName = item.brand || "Не указана";
                excelData.push([`    └─ ${dt}`, type, brandName, Math.round(item.totalStock), item.lostSKUPercent.toFixed(1), item.matrixSKUCount, item.currentSKUCount]);
            }
        }
    }
    
    // Создаем и скачиваем Excel файл
    const ws = XLSX.utils.aoa_to_sheet(excelData);
    
    // Настройка ширины колонок
    ws['!cols'] = [
        { wch: 35 }, // ДТ
        { wch: 15 }, // Тип корма
        { wch: 20 }, // Торговая марка
        { wch: 18 }, // Остаток
        { wch: 20 }, // Потеря СКЮ
        { wch: 12 }, // Матрица СКЮ
        { wch: 12 }  // Текущие СКЮ
    ];
    
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Анализ_остатков');
    XLSX.writeFile(wb, `Анализ_остатков_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xlsx`);
}

// Функция для расчета отклонений для KPI карточек (включая промо)
function calculateKPIDeviations(salesData) {
    // Агрегируем данные по годам
    let totalSales2025 = 0;
    let totalSales2026 = 0;
    let akb2025 = new Set();
    let akb2026 = new Set();
    let ttProductivity2025 = new Map();
    let ttProductivity2026 = new Map();
    
    // Для расчета промо-доли
    let promoWeight2025 = 0;
    let promoWeight2026 = 0;
    let totalWeight2025 = 0;
    let totalWeight2026 = 0;
    
    salesData.forEach(sale => {
        const w = sale.weightKg || 0;
        const discount = sale.discount || 0;
        const isPromo = discount >= 5; // Скидка 5% и выше считаем промо
        
        if (sale.year === 2025) {
            totalSales2025 += w;
            totalWeight2025 += w;
            if (isPromo) {
                promoWeight2025 += w;
            }
            if (sale.ttAddress && sale.ttAddress !== "") {
                akb2025.add(sale.ttAddress);
            }

async function loadDataFromUrls(urls, isFirstFileHasHeader = true, batchSize = 2) {
    const urlList = Array.isArray(urls) ? urls : [urls];
    let combinedRows = [];
    let isFirstFile = true;
    let totalProcessed = 0;
    
    // Показываем прогресс-бар
    showProgressBar();
    updateProgress(0, urlList.length, 'Начинаем загрузку...');
    
    console.log(`🚀 Начинаем загрузку ${urlList.length} файлов, по ${batchSize} одновременно`);
    
    // Разбиваем на группы по batchSize файлов
    for (let i = 0; i < urlList.length; i += batchSize) {
        const batch = urlList.slice(i, i + batchSize);
        const batchNumber = Math.floor(i / batchSize) + 1;
        const totalBatches = Math.ceil(urlList.length / batchSize);
        
        updateProgressText(`📦 Группа ${batchNumber}/${totalBatches}`);
        
        // Загружаем группу параллельно
        const batchResults = await Promise.all(
            batch.map(async (url, idx) => {
                const fileNum = i + idx + 1;
                updateProgressText(`📁 Файл ${fileNum}/${urlList.length}...`);
                const rows = await loadExcelFromUrl(url);
                console.log(`✅ Файл ${fileNum} загружен: ${rows?.length || 0} строк`);
                return rows;
            })
        );
        
        // Обрабатываем результаты группы
        for (const rows of batchResults) {
            if (rows && rows.length > 1) {
                if (isFirstFile && isFirstFileHasHeader) {
                    for (let j = 0; j < rows.length; j++) {
                        combinedRows.push(rows[j]);
                    }
                    isFirstFile = false;
                } else {
                    for (let j = 1; j < rows.length; j++) {
                        combinedRows.push(rows[j]);
                    }
                }
            }
            totalProcessed++;
            updateProgress(totalProcessed, urlList.length);
        }
        
        // Пауза между группами
        if (i + batchSize < urlList.length) {
            updateProgressText(`⏳ Пауза 3 секунды...`);
            await new Promise(r => setTimeout(r, 3000));
        }
    }
    
    updateProgressText(`✅ Загружено ${combinedRows.length} строк! Построение аналитики...`);
    console.log(`📊 Всего загружено строк: ${combinedRows.length}`);
    
    return combinedRows;
}

// Функция для расчета данных по месяцам
function calculateTableData(salesData) {
    const tableDataMap = new Map();
    
    salesData.forEach(sale => {
        if (!sale.year || !sale.month) return;
        
        const key = `${sale.year}-${sale.month}`;
        if (!tableDataMap.has(key)) {
            tableDataMap.set(key, {
                year: sale.year,
                month: sale.month,
                sales_kg: 0,
                akb_tt: new Set(),
                new_tt: new Set(),
                lost_tt: new Set(),
                avg_sales_per_tt: 0,
                avg_sku: { ttSet: new Set(), skuSet: new Set() }
            });
        }
        
        const record = tableDataMap.get(key);
        
        // Продажи в кг
        if (sale.weightKg && sale.weightKg > 0) {
            record.sales_kg += sale.weightKg;
        }
        
        // АКБ (уникальные ТТ)
// ИСПРАВЛЕННЫЙ код:
if (sale.ttAddress && sale.ttAddress !== "") {
    record.akb_tt.add(sale.ttAddress);
    
    // Для средних продаж на ТТ (используем отдельный Set)
    if (!record.avg_sales_per_tt_set) {
        record.avg_sales_per_tt_set = new Set();
    }
    record.avg_sales_per_tt_set.add(sale.ttAddress);
    
    // Для SKU
    if (typeof record.avg_sku.ttSet.add === 'function') {
        record.avg_sku.ttSet.add(sale.ttAddress);
    }
}
        if (sale.productName && sale.productName !== "") {
            if (typeof record.avg_sku.skuSet.add === 'function') {
                record.avg_sku.skuSet.add(sale.productName);
            }
        }
    });
    
    // Преобразуем Set в размеры и считаем средние
    const monthsList = Array.from(tableDataMap.keys()).sort();
    const result = [];
    
    monthsList.forEach((key, idx) => {
        const record = tableDataMap.get(key);
        
        // Расчет потерянных и новых ТТ
        const currentTTs = record.akb_tt;
        let newTTs = new Set();
        let lostTTs = new Set();
        
        if (idx > 0) {
            // Новые ТТ (появились в текущем месяце, не были в предыдущих 3 месяцах)
            const last3Months = monthsList.slice(Math.max(0, idx - 3), idx);
            const ttInLast3Months = new Set();
            last3Months.forEach(monthKey => {
                tableDataMap.get(monthKey).akb_tt.forEach(tt => ttInLast3Months.add(tt));
            });
            
            currentTTs.forEach(tt => {
                if (!ttInLast3Months.has(tt)) {
                    newTTs.add(tt);
                }
            });
            
            // Потерянные ТТ (не покупали более 6 месяцев)
            const next6Months = monthsList.slice(idx + 1, idx + 7);
            const ttInNext6Months = new Set();
            next6Months.forEach(monthKey => {
                if (tableDataMap.get(monthKey)) {
                    tableDataMap.get(monthKey).akb_tt.forEach(tt => ttInNext6Months.add(tt));
                }
            });
            
            currentTTs.forEach(tt => {
                if (!ttInNext6Months.has(tt)) {
                    lostTTs.add(tt);
                }
            });
        }
        
        // Средние продажи на ТТ
    let avgSalesPerTT = 0;
if (record.avg_sales_per_tt_set && record.avg_sales_per_tt_set.size > 0) {
    avgSalesPerTT = record.sales_kg / record.avg_sales_per_tt_set.size;
} else if (record.akb_tt.size > 0) {
    avgSalesPerTT = record.sales_kg / record.akb_tt.size;
}
       
        // Среднее количество SKU на ТТ
        let avgSkuPerTT = 0;
        if (record.avg_sku.ttSet.size > 0) {
            avgSkuPerTT = record.avg_sku.skuSet.size / record.avg_sku.ttSet.size;
        } else if (record.akb_tt.size > 0) {
            avgSkuPerTT = record.avg_sku.skuSet.size / record.akb_tt.size;
        }
        
        result.push({
            year: record.year,
            month: record.month,
            sales_kg: record.sales_kg,
            akb_tt: record.akb_tt.size,
            new_tt: newTTs.size,
            lost_tt: lostTTs.size,
            avg_sales_per_tt: avgSalesPerTT,
            avg_sku: avgSkuPerTT
        });
    });
    
    return result;
}

// Получить настройки для конкретной метрики
function getMetricSettings(metric) {
    // Если есть индивидуальная настройка для колонки - используем её
    if (columnCustomSettings.has(metric)) {
        return columnCustomSettings.get(metric);
    }
    // Иначе возвращаем глобальные настройки
    return { mode: globalMode, period: globalPeriod };
}

// Рассчитать отклонение для значения
function calculateDeviation(currentValue, previousValue, mode) {
    if (mode === 'percent') {
        if (previousValue === 0 || previousValue === null) {
            return currentValue !== 0 ? 100 : 0;
        }
        return ((currentValue - previousValue) / previousValue) * 100;
    } else if (mode === 'absolute') {
        return currentValue - previousValue;
    }
    return currentValue;
}

// Применить настройки к данным для конкретной метрики
function applyMetricSettings(data, metric, settings) {
    if (settings.mode === 'actual') {
        return data.map(item => ({
            ...item,
            [metric]: item[metric],
            [`${metric}_is_calculated`]: false
        }));
    }
    
    // Сортируем данные
    const sorted = [...data].sort((a, b) => {
        if (a.year !== b.year) return a.year - b.year;
        return a.month - b.month;
    });
    
    return sorted.map((item, idx) => {
        let previousValue = null;
        
        if (settings.period === 'yoy') {
            const prevYearItem = sorted.find(i => i.year === item.year - 1 && i.month === item.month);
            previousValue = prevYearItem ? prevYearItem[metric] : null;
        } else if (settings.period === 'mom' && idx > 0) {
            previousValue = sorted[idx - 1][metric];
        }
        
        const calculatedValue = calculateDeviation(item[metric], previousValue, settings.mode);
        
        return {
            ...item,
            [metric]: calculatedValue,
            [`${metric}_original`]: item[metric],
            [`${metric}_is_calculated`]: true,
            [`${metric}_mode`]: settings.mode
        };
    });
}

// Применить все настройки ко всем метрикам
function applyAllSettings(data) {
    let result = [...data];
    
    numericMetrics.forEach(metric => {
        const settings = getMetricSettings(metric);
        result = applyMetricSettings(result, metric, settings);
    });
    
    return result;
}

// Показать контекстное меню
function showContextMenu(x, y, metric) {
    // Удаляем существующее меню
    const existingMenu = document.querySelector('.context-menu');
    if (existingMenu) existingMenu.remove();
    
    const currentSettings = getMetricSettings(metric);
    
    const menu = document.createElement('div');
    menu.className = 'context-menu';
    menu.style.left = x + 'px';
    menu.style.top = y + 'px';
    
    const items = [
        { mode: 'actual', period: null, label: '📊 Значения', active: currentSettings.mode === 'actual' },
        { divider: true },
        { mode: 'percent', period: 'yoy', label: ' % год к году', active: currentSettings.mode === 'percent' && currentSettings.period === 'yoy' },
        { mode: 'percent', period: 'mom', label: ' % месяц к месяцу', active: currentSettings.mode === 'percent' && currentSettings.period === 'mom' },
        { divider: true },
        { mode: 'absolute', period: 'yoy', label: ' Δ год к году', active: currentSettings.mode === 'absolute' && currentSettings.period === 'yoy' },
        { mode: 'absolute', period: 'mom', label: ' Δ месяц к месяцу', active: currentSettings.mode === 'absolute' && currentSettings.period === 'mom' },
        { divider: true },
        { label: '🔄 Сбросить настройки', action: 'reset', active: false }
    ];
    
    items.forEach(item => {
        if (item.divider) {
            const divider = document.createElement('div');
            divider.className = 'context-menu-divider';
            menu.appendChild(divider);
        } else {
            const menuItem = document.createElement('div');
            menuItem.className = 'context-menu-item';
            if (item.active) menuItem.classList.add('active');
            menuItem.innerHTML = item.label;
            
            menuItem.addEventListener('click', () => {
                if (item.action === 'reset') {
                    columnCustomSettings.delete(metric);
                } else if (item.mode === 'actual') {
                    columnCustomSettings.delete(metric);
                } else {
                    columnCustomSettings.set(metric, { mode: item.mode, period: item.period });
                }
                renderDynamicTable();
                menu.remove();
            });
            
            menu.appendChild(menuItem);
        }
    });
    
    document.body.appendChild(menu);
    
    // Закрыть меню при клике вне
    document.addEventListener('click', function closeMenu(e) {
        if (!menu.contains(e.target)) {
            menu.remove();
            document.removeEventListener('click', closeMenu);
        }
    });
}
// Создание мультиселекта
function createMultiselect(container, field, label, values) {
    const btn = container.querySelector('.multiselect-btn');
    const dropdown = container.querySelector('.multiselect-dropdown');
    const optionsContainer = container.querySelector('.multiselect-options');
    const searchInput = container.querySelector('.multiselect-search input');
    const valueSpan = container.querySelector('.multiselect-value');
    
    let selectedValues = filterValues[field];
    
    // Сортируем значения по алфавиту (кроме 'all')
const sortedValues = [...values]
    .filter(v => v !== 'all')
    .sort((a, b) => {
        if (typeof a === 'number') return a - b;
        return String(a).localeCompare(String(b), 'ru');
    });
    if (values.has('all')) sortedValues.unshift('all');
    
    function renderOptions(filterText = '') {
        let html = '';
        sortedValues.forEach(value => {
            if (value === 'all') {
                const isChecked = selectedValues.size === 0 || selectedValues.has('all');
                html += `
                    <div class="multiselect-option" data-value="all">
                        <input type="checkbox" ${isChecked ? 'checked' : ''} id="${field}_all">
                        <label for="${field}_all">Все ${label}</label>
                    </div>
                `;
            } else {
                const displayValue = value;
                if (filterText && !String(displayValue).toLowerCase().includes(filterText.toLowerCase())) return;
                const isChecked = selectedValues.has(value);
                html += `
                    <div class="multiselect-option" data-value="${String(value).replace(/"/g, '&quot;')}">
                        <input type="checkbox" ${isChecked ? 'checked' : ''} id="${field}_${String(value).replace(/[^a-z0-9]/gi, '_')}">
                        <label for="${field}_${String(value).replace(/[^a-z0-9]/gi, '_')}">${displayValue}</label>
                    </div>
                `;
            }
        });
        optionsContainer.innerHTML = html;
        
        // Добавляем обработчики
        optionsContainer.querySelectorAll('.multiselect-option').forEach(opt => {
            const checkbox = opt.querySelector('input');
            const value = opt.dataset.value;
            
            checkbox.addEventListener('change', (e) => {
                e.stopPropagation();
                if (value === 'all') {
                    if (checkbox.checked) {
                        selectedValues.clear();
                        selectedValues.add('all');
                        optionsContainer.querySelectorAll('.multiselect-option').forEach(o => {
                            if (o.dataset.value !== 'all') {
                                o.querySelector('input').checked = false;
                            }
                        });
                    } else {
                        selectedValues.delete('all');
                    }
                } else {
                    if (checkbox.checked) {
                        selectedValues.delete('all');
                        if (optionsContainer.querySelector('.multiselect-option[data-value="all"] input')) {
                            optionsContainer.querySelector('.multiselect-option[data-value="all"] input').checked = false;
                        }
                        selectedValues.add(value);
                    } else {
                        selectedValues.delete(value);
                    }
                }
                updateButtonText();
            });
        });
    }
    
    function updateButtonText() {
        const count = selectedValues.size === 0 || (selectedValues.size === 1 && selectedValues.has('all')) ? 0 : selectedValues.size;
        if (count === 0) {
            valueSpan.innerHTML = `Все ${label}`;
        } else {
            valueSpan.innerHTML = `Выбрано: ${count}`;
            const countSpan = document.createElement('span');
            countSpan.className = 'selected-count';
            countSpan.textContent = count;
            valueSpan.appendChild(countSpan);
        }
    }
    
    // Обработчики
    btn.addEventListener('click', (e) => {
        e.stopPropagation();
        dropdown.classList.toggle('show');
        if (dropdown.classList.contains('show') && searchInput) {
            searchInput.focus();
        }
    });
    
    if (searchInput) {
        searchInput.addEventListener('input', (e) => {
            renderOptions(e.target.value);
        });
    }
    
    // Закрытие при клике вне
    document.addEventListener('click', function(e) {
        if (!container.contains(e.target)) {
            dropdown.classList.remove('show');
        }
    });
    
    renderOptions();
    updateButtonText();
}

            const monthName = monthNames[item.month - 1] || item.month;
            if (!filterValues.month.has(monthName)) return false;
        }
        // ДМ
        if (filterValues.dm.size > 0 && !filterValues.dm.has('all')) {
            if (!filterValues.dm.has(item.dm)) return false;
        }
        // РМ
        if (filterValues.rm.size > 0 && !filterValues.rm.has('all')) {
            if (!filterValues.rm.has(item.rm)) return false;
        }
        // ДТ
        if (filterValues.dt.size > 0 && !filterValues.dt.has('all')) {
            if (!filterValues.dt.has(item.dt)) return false;
        }
        // СВ
        if (filterValues.sv.size > 0 && !filterValues.sv.has('all')) {
            if (!filterValues.sv.has(item.sv)) return false;
        }
        // ТП
        if (filterValues.tp.size > 0 && !filterValues.tp.has('all')) {
            if (!filterValues.tp.has(item.tp)) return false;
        }
        // ТМ
        if (filterValues.tm.size > 0 && !filterValues.tm.has('all')) {
            if (!filterValues.tm.has(item.tm)) return false;
        }
        // Тип
        if (filterValues.type.size > 0 && !filterValues.type.has('all')) {
            if (!filterValues.type.has(item.type)) return false;
        }
        return true;
    });
}

function renderDynamicTable() {
    const container = document.getElementById('dynamicTableContainer');
    if (!container) return;
    
    if (tableData.length === 0) {
        container.innerHTML = '<div class="table-status">⚠️ Нет данных для отображения</div>';
        return;
    }
    
    if (selectedMetrics.size === 0) {
        container.innerHTML = '<div class="table-status">✅ Выберите хотя бы один показатель для отображения</div>';
        return;
    }
    
    const columnOrder = [];
    const columnLabels = {
        year: 'Год',
        month: 'Месяц',
        sales_kg: 'Продажи, кг',
        avg_sales_per_tt: 'Ср. продажи/ТТ, кг',
        akb_tt: 'АКБ, ТТ',
        new_tt: 'Новые ТТ',
        lost_tt: 'Потерянные ТТ',
        avg_sku: 'Ср. кол-во СКЮ'
    };
    
    const priorityOrder = ['year', 'month', 'sales_kg', 'akb_tt', 'new_tt', 'lost_tt', 'avg_sales_per_tt', 'avg_sku'];
    priorityOrder.forEach(metric => {
        if (selectedMetrics.has(metric)) {
            columnOrder.push(metric);
        }
    });
    
    // Применяем все настройки к данным
    let processedData = applyAllSettings(tableData);
    
    // Сортировка
let sortedData = [...processedData];
    if (currentSortColumn && columnOrder.includes(currentSortColumn)) {
        sortedData.sort((a, b) => {
            let valA = a[currentSortColumn];
            let valB = b[currentSortColumn];
            
            if (currentSortColumn === 'month') {
                valA = a.month;
                valB = b.month;
            }
            
            if (typeof valA === 'number' && typeof valB === 'number') {
                return currentSortDirection === 'asc' ? valA - valB : valB - valA;
            }
            
            valA = String(valA || '');
            valB = String(valB || '');
            return currentSortDirection === 'asc' 
                ? valA.localeCompare(valB, 'ru')
                : valB.localeCompare(valA, 'ru');
        });
    }
    
    // Формируем HTML
    let html = '<div class="table-container-scroll"><table class="dynamic-table" id="exportTable"><thead><tr>';
    
    columnOrder.forEach(metric => {
        const settings = getMetricSettings(metric);
        let indicator = '';
        if (settings.mode === 'percent') indicator = '<span class="column-indicator">%</span>';
        else if (settings.mode === 'absolute') indicator = '<span class="column-indicator">Δ</span>';
        
        const sortClass = currentSortColumn === metric 
            ? `sortable-header ${currentSortDirection}` 
            : 'sortable-header';
        html += `<th class="${sortClass}" data-sort="${metric}" data-metric="${metric}">${columnLabels[metric]}${indicator}</th>`;
    });
    html += '<tr></thead><tbody>';
    
    sortedData.forEach(row => {
        html += '<tr>';
        columnOrder.forEach(metric => {
            let value = row[metric];
            const isCalculated = row[`${metric}_is_calculated`];
            const mode = row[`${metric}_mode`];
            
            if (metric === 'month') {
                const monthNames = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
                value = monthNames[value - 1] || value;
            } else if (metric === 'sales_kg' && !isCalculated) {
                value = value.toLocaleString() + ' кг';
            } else if (typeof value === 'number') {
                if (isCalculated && mode === 'percent') {
                    const color = value > 0 ? '#2A7A4B' : (value < 0 ? '#C44B3C' : '#666');
                    const sign = value > 0 ? '+' : '';
                    value = `<span style="color: ${color}; font-weight: 600;">${sign}${value.toFixed(1)}%</span>`;
                } else if (isCalculated && mode === 'absolute') {
                    const color = value > 0 ? '#2A7A4B' : (value < 0 ? '#C44B3C' : '#666');
                    const sign = value > 0 ? '+' : '';
                    value = `<span style="color: ${color}; font-weight: 600;">${sign}${value.toFixed(1)}</span>`;
                } else {
                    value = value.toFixed(2);
                }
            }
            html += `<td>${value || 0}</td>`;
        });
        html += '</tr>';
    });
    
    html += '</tbody></table></div>';
    container.innerHTML = html;
    
    // Добавляем обработчики сортировки и контекстного меню
    document.querySelectorAll('.sortable-header').forEach(th => {
        th.addEventListener('click', function(e) {
            const sortMetric = this.dataset.sort;
            if (currentSortColumn === sortMetric) {
                currentSortDirection = currentSortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                currentSortColumn = sortMetric;
                currentSortDirection = 'asc';
            }
            renderDynamicTable();
        });
        
        // Контекстное меню
        th.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            const metric = this.dataset.metric;
            if (!numericMetrics.includes(metric)) return;
            
            showContextMenu(e.clientX, e.clientY, metric);
        });
    });
}

// Инициализация контролов таблицы
function initTableControls() {
    // Кнопки выбора показателей
    document.querySelectorAll('.metric-option').forEach(btn => {
        btn.addEventListener('click', function() {
            const metric = this.dataset.metric;
            if (selectedMetrics.has(metric)) {
                selectedMetrics.delete(metric);
                this.classList.remove('selected');
            } else {
                selectedMetrics.add(metric);
                this.classList.add('selected');
            }
            renderDynamicTable();
        });
        
        if (selectedMetrics.has(btn.dataset.metric)) {
            btn.classList.add('selected');
        }
    });
    
    // Глобальный переключатель режима
    const modeSelector = document.getElementById('modeSelector');
    const periodSelector = document.getElementById('periodSelector');
    const resetBtn = document.getElementById('resetCustomBtn');
    
    if (modeSelector) {
        modeSelector.addEventListener('click', function() {
            if (globalMode === 'actual') {
                globalMode = 'percent';
                modeSelector.innerHTML = ' Проценты';
                periodSelector.classList.remove('disabled');
            } else if (globalMode === 'percent') {
                globalMode = 'absolute';
                modeSelector.innerHTML = ' Абсолютные';
            } else {
                globalMode = 'actual';
                modeSelector.innerHTML = ' Значения';
                periodSelector.classList.add('disabled');
            }
            renderDynamicTable();
        });
    }
    
    if (periodSelector) {
        periodSelector.addEventListener('click', function() {
            if (globalMode === 'actual') return;
            
            if (globalPeriod === 'yoy') {
                globalPeriod = 'mom';
                periodSelector.innerHTML = ' Мес к мес';
            } else {
                globalPeriod = 'yoy';
                periodSelector.innerHTML = ' Год к году';
            }
            renderDynamicTable();
        });
        
        if (globalMode === 'actual') {
            periodSelector.classList.add('disabled');
        }
    }
    
    if (resetBtn) {
        resetBtn.addEventListener('click', function() {
            columnCustomSettings.clear();
            globalMode = 'actual';
            globalPeriod = 'yoy';
            modeSelector.innerHTML = ' Значения';
            periodSelector.innerHTML = ' Год к году';
            periodSelector.classList.add('disabled');
            renderDynamicTable();
        });
    }
    
    // Экспорт
    const exportBtn = document.getElementById('exportExcelBtn');
    if (exportBtn) {
        const newExportBtn = exportBtn.cloneNode(true);
        exportBtn.parentNode.replaceChild(newExportBtn, exportBtn);
        newExportBtn.addEventListener('click', exportToExcel);
    }
}

function updateProgress(current, total, fileName = '') {
    if (!progressBarFill || !progressPercentSpan) return;
    
    const percent = Math.round((current / total) * 100);
    progressBarFill.style.width = `${percent}%`;
    progressPercentSpan.textContent = `${percent}%`;
    
    if (fileName && progressCurrentSpan) {
        let shortName = fileName.split('/').pop().substring(0, 40);
        progressCurrentSpan.textContent = `📄 ${shortName}...`;
    }
}

function updateProgressText(text) {
    if (progressCurrentSpan) {
        progressCurrentSpan.textContent = text;
    }
